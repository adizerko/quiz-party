<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра в процессе</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <div id="player-view" style="display: none;" class="glass-card">
        <h2 id="q-text">Ожидание вопроса...</h2>
        <div id="player-answer-zone"></div>
    </div>

    <div id="host-view" style="display: none;" class="glass-card">
        <h2>Панель Ведущего</h2>
        <p id="host-q-text">Текст вопроса</p>
        <div id="incoming-answers"></div>
        <button onclick="nextStep()" class="btn-primary">Далее</button>
    </div>

    <script>
        // Простая логика: если в ссылке есть ?role=host, показываем админку
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role');

        if (role === 'host') {
            document.getElementById('host-view').style.display = 'block';
        } else {
            document.getElementById('player-view').style.display = 'block';
        }
    </script>
    <script src="js/api.js"></script>
    <script src="js/player.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>

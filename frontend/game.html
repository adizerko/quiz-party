<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Quiz</title>
    <link rel="stylesheet" href="css/game.css">
</head>
<body>
    <div class="main-container">
        
        <div id="host-screen" class="game-card" style="display: none;">
            <span class="status-badge">Host Panel</span>
            
            <div id="host-lobby">
                <span class="emoji-logo">🎉</span>
                <h2 class="game-question">Ждем гостей</h2>
                <p style="font-weight: 600; color: var(--party-purple);">Код: <span id="display-room-code"></span></p>
                <div id="lobby-players-list" style="margin: 20px 0;"></div>
                <button onclick="startGame()" class="btn-party-main">Начать игру</button>
            </div>

            <div id="host-game-area" style="display: none;">
                <h2 id="host-question-text" class="game-question"></h2>
                <div id="players-answers-grid"></div>
                <button onclick="nextQuestion()" class="btn-party-main" style="margin-top:20px; background: var(--party-purple);">Дальше ➡️</button>
            </div>
        </div>

        <div id="player-screen" class="game-card" style="display: none;">
            <span class="status-badge">Player</span>
            
            <div id="player-wait">
                <span class="emoji-logo">🎈</span>
                <h2 class="game-question">Ты в игре!</h2>
                <p>Дождись, пока организатор нажмет «Старт»</p>
            </div>

            <div id="player-game-area" style="display: none;">
                <h2 id="player-question-text" class="game-question"></h2>
                <div id="player-answer-area"></div>
            </div>
        </div>

    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/game.js"></script>
</body>
</html>

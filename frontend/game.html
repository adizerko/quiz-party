<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Party - Игра</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body class="party-bg">
    <div class="main-container">
        <div id="host-screen" class="party-card game-card" style="display: none;">
            <div class="status-badge">РЕЖИМ ВЕДУЩЕГО</div>
            <h2 id="host-question-text" class="game-question">Загрузка вопроса...</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-val" id="answers-count">0</span>
                    <span class="stat-label">ответов</span>
                </div>
            </div>
            <div id="host-controls">
                <button onclick="nextQuestion()" class="btn-party-direct">Следующий вопрос 🚀</button>
            </div>
        </div>

        <div id="player-screen" class="party-card game-card" style="display: none;">
            <div class="status-badge">ИГРОК</div>
            <h2 id="player-question-text" class="game-question">Ожидаем начала...</h2>
            <div id="player-answer-area" class="answer-area">
                <div class="waiting-spinner">⏳</div>
                <p>Скоро здесь появится вопрос!</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Создание Quiz Party</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-papE4t6p+4Ztgn9D2R4Xj2y74GgHgPoJ+ehvW4QcCj+qMCEZ0R4ULrHav+dTpsI2YErRnHEmfSmB23zZQebxww==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/create.css">
</head>
<body class="party-bg">
    <div id="toast-container"></div>
    <div class="balloon balloon-1"></div>
    <div class="balloon balloon-2"></div>
    <div class="balloon balloon-3"></div>

    <div class="main-container">
        <div class="party-card">
            <div class="header-nav">
                <a href="index.html" class="btn-back">← Назад</a>
            </div>
            <h1 class="party-title">QUIZ PARTY</h1>
            
            <div class="input-group main-title-group">
                <label>Название вечеринки:</label>
                <input type="text" id="quiz-title-input" placeholder="Например: ДР Артёма 🎂" class="main-title-input">
            </div>

            <div class="creation-zone">
                <div class="input-group">
                    <label>Твой вопрос:</label>
                    <input type="text" id="q-input-text" placeholder="Кто тут самый крутой?" maxlength="70">
                </div>

                <div class="input-group">
                    <label>Тип ответа:</label>
                    <div class="type-selector">
                        <div class="type-option" onclick="selectType('text', this)">
                            <i class="fa-solid fa-pen"></i> Текст
                        </div>
                        <div class="type-option active" onclick="selectType('options', this)">
                            <i class="fa-solid fa-circle-dot"></i> Выбор
                        </div>
                        <input type="hidden" id="q-input-type" value="options">
                    </div>
                </div>

                <div id="options-fields" class="options-creation-zone">
                    <p class="section-hint">Отметь правильный вариант:</p>
                    <div class="opt-create-row"><input type="text" id="opt-1" placeholder="Вариант 1" class="opt-input"> <input type="radio" name="correct-opt" value="0" checked></div>
                    <div class="opt-create-row"><input type="text" id="opt-2" placeholder="Вариант 2" class="opt-input"> <input type="radio" name="correct-opt" value="1"></div>
                    <div class="opt-create-row"><input type="text" id="opt-3" placeholder="Вариант 3" class="opt-input"> <input type="radio" name="correct-opt" value="2"></div>
                    <div class="opt-create-row"><input type="text" id="opt-4" placeholder="Вариант 4" class="opt-input"> <input type="radio" name="correct-opt" value="3"></div>
                </div>

                <div id="correct-answer-zone" class="input-group" style="display: none;">
                    <label>Ответ:</label>
                    <input type="text" id="q-input-correct" placeholder="Введите текст ответа" maxlength="35">
                </div>

                <button id="add-btn" onclick="addQuestionToList()" class="btn-party-add">ДОБАВИТЬ ВОПРОС</button>
            </div>

            <div class="list-zone">
                <div class="questions-header">
                    <div class="questions-title">
                        Вопросы
                    </div>
                    <div class="questions-count">
                        <span id="q-count">0</span>
                    </div>
                </div>
                <div id="questions-list" class="party-scroll-list"></div>
            </div>

            <button onclick="saveAndGo()" class="btn-party-launch">
                <span class="btn-glow"></span>
                <span class="btn-content">🚀 ЗАЖЕЧЬ ВЕЧЕРИНКУ!</span>
            </button>
        </div>
    </div>
    <script src="js/create.js"></script>
</body>
</html>
